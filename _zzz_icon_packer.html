<!DOCTYPE html><html><head><meta charset="UTF-8"><title>ZZZ Icon Packer</title>
<meta name="viewport" content="width=device-width,initial-scale=1">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#141416;font-family:-apple-system,'Rubik',sans-serif;color:#e8e8ea;padding:24px 16px;max-width:640px;margin:0 auto}
h1{font-size:16px;letter-spacing:.1em;text-transform:uppercase}
h1 span{color:#d3fd51}
p{font-size:13px;color:#9a9aa2;line-height:1.6;margin:10px 0}
#go{display:block;width:100%;font:800 14px -apple-system,sans-serif;letter-spacing:.08em;text-transform:uppercase;background:#d3fd51;color:#141408;border:0;padding:14px;border-radius:8px;margin:14px 0}
#go:disabled{background:#3a3a40;color:#8f8f96}
#log{font:12px ui-monospace,monospace;color:#c9e88a;line-height:1.7;white-space:pre-wrap;background:#101013;border:1px solid #26262b;border-radius:8px;padding:12px;min-height:80px;max-height:45vh;overflow:auto}
#bar{height:8px;background:#26262b;border-radius:4px;overflow:hidden;margin:10px 0}
#bar i{display:block;height:100%;width:0;background:#d3fd51}
</style></head><body>
<h1>ZZZ <span>Icon Packer</span></h1>
<p>Tap the button. This page downloads the missing agent icons through the wsrv.nl proxy (the route that works on your network), packs them into <b>zzz-icons.zip</b>, and saves it to your phone. Then attach that zip in the Claude chat.</p>
<button id="go">Download the 2 missing icons (Velina + Norma)</button>
<div id="bar"><i></i></div>
<div id="log">ready.</div>
<script>
var A=[{"slug": "velina", "name": "Velina", "cands": ["https://static.wikia.nocookie.net/zenless-zone-zero/images/f/fb/Agent_Velina_Airgid_Icon.png", "https://static.wikia.nocookie.net/zenless-zone-zero/images/e/ee/Velina_Airgid_Icon.png", "https://static.wikia.nocookie.net/zenless-zone-zero/images/c/cf/Agent_Velina_Airgid_Portrait.png", "https://static.wikia.nocookie.net/zenless-zone-zero/images/4/4a/Velina_Airgid_Portrait.png"]}, {"slug": "norma", "name": "Norma", "cands": ["https://static.wikia.nocookie.net/zenless-zone-zero/images/1/18/Agent_Norma_Hollowell_Icon.png", "https://static.wikia.nocookie.net/zenless-zone-zero/images/1/11/Norma_Hollowell_Icon.png", "https://static.wikia.nocookie.net/zenless-zone-zero/images/1/10/Agent_Norma_Hollowell_Portrait.png", "https://static.wikia.nocookie.net/zenless-zone-zero/images/9/9a/Norma_Hollowell_Portrait.png"]}];
var log=document.getElementById('log'),bar=document.querySelector('#bar i'),go=document.getElementById('go');
function say(s){log.textContent+='\n'+s;log.scrollTop=1e9;}

// minimal STORE-only zip writer
var CRC=(function(){var t=[];for(var n=0;n<256;n++){var c=n;for(var k=0;k<8;k++)c=c&1?0xEDB88320^(c>>>1):c>>>1;t[n]=c>>>0;}return function(b){var c=0xFFFFFFFF;for(var i=0;i<b.length;i++)c=t[(c^b[i])&0xFF]^(c>>>8);return (c^0xFFFFFFFF)>>>0;};})();
function zip(files){ // files: [{name, data(Uint8Array)}]
 var parts=[],central=[],off=0,enc=new TextEncoder();
 function u16(v){return new Uint8Array([v&255,(v>>8)&255]);}
 function u32(v){return new Uint8Array([v&255,(v>>8)&255,(v>>16)&255,(v>>>24)&255]);}
 files.forEach(function(f){
  var n=enc.encode(f.name),crc=CRC(f.data);
  var lh=[u32(0x04034b50),u16(20),u16(0),u16(0),u16(0),u16(0),u32(crc),u32(f.data.length),u32(f.data.length),u16(n.length),u16(0)];
  var lhLen=30+n.length;
  parts.push.apply(parts,lh);parts.push(n,f.data);
  central.push({n:n,crc:crc,size:f.data.length,off:off});
  off+=lhLen+f.data.length;
 });
 var cdStart=off,cdLen=0;
 central.forEach(function(c){
  var ch=[u32(0x02014b50),u16(20),u16(20),u16(0),u16(0),u16(0),u16(0),u32(c.crc),u32(c.size),u32(c.size),u16(c.n.length),u16(0),u16(0),u16(0),u16(0),u32(0),u32(c.off)];
  parts.push.apply(parts,ch);parts.push(c.n);cdLen+=46+c.n.length;
 });
 parts.push(u32(0x06054b50),u16(0),u16(0),u16(central.length),u16(central.length),u32(cdLen),u32(cdStart),u16(0));
 return new Blob(parts,{type:'application/zip'});
}
function prox(u){return 'https://wsrv.nl/?url='+encodeURIComponent(u);}
go.onclick=async function(){
 go.disabled=true;var files=[],fail=[];
 for(var i=0;i<A.length;i++){
  var a=A[i];bar.style.width=((i+1)/A.length*100)+'%';
  var got=null,err='';
  for(var c=0;c<a.cands.length&&!got;c++){
   for(var t=0;t<2&&!got;t++){
    try{
     var r=await fetch(prox(a.cands[c]));
     if(!r.ok)throw new Error('HTTP '+r.status);
     var b=new Uint8Array(await r.arrayBuffer());
     if(b.length<100)throw new Error('too small');
     got=b;
    }catch(e){err=e.message;}
   }
  }
  if(got){files.push({name:a.slug+'.png',data:got});say('✓ '+a.name+' ('+Math.round(got.length/1024)+' KB)');}
  else{fail.push(a.slug);say('✗ '+a.name+' — '+err);}
 }
 say('---');
 say('done: '+files.length+' ok, '+fail.length+' failed'+(fail.length?' ['+fail.join(', ')+']':''));
 if(files.length){
  var blob=zip(files),u=URL.createObjectURL(blob),aEl=document.createElement('a');
  aEl.href=u;aEl.download='zzz-icons.zip';document.body.appendChild(aEl);aEl.click();
  say('zip saved ('+Math.round(blob.size/1024)+' KB) — attach it in the Claude chat.');
 }
 go.disabled=false;
};
</script></body></html>
