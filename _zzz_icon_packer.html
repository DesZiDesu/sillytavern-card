// minimal STORE-only zip writer
var CRC=(function(){var t=[];for(var n=0;n<256;n++){var c=n;for(var k=0;k<8;k++)c=c&1?0xEDB88320^(c>>>1):c>>>1;t[n]=c>>>0;}return function(b){var c=0xFFFFFFFF;for(var i=0;i<b.length;i++)c=t[(c^b[i])&0xFF]^(c>>>8);return (c^0xFFFFFFFF)>>>0;};})();
function zip(files){ // files: [{name, data(Uint8Array)}]
 var parts=[],central=[],off=0,enc=new TextEncoder();
 function u16(v){return new Uint8Array([v&255,(v>>8)&255]);}
 function u32(v){return new Uint8Array([v&255,(v>>8)&255,(v>>16)&255,(v>>>24)&255]);}
 files.forEach(function(f){
  var n=enc.encode(f.name),crc=CRC(f.data);
  var lh=[u32(0x04034b50),u16(20),u16(0),u16(0),u16(0),u16(0),u32(crc),u32(f.data.length),u32(f.data.length),u16(n.length),u16(0)];
  var lhLen=30+n.length;
  parts.push.apply(parts,lh);parts.push(n,f.data);
  central.push({n:n,crc:crc,size:f.data.length,off:off});
  off+=lhLen+f.data.length;
 });
 var cdStart=off,cdLen=0;
 central.forEach(function(c){
  var ch=[u32(0x02014b50),u16(20),u16(20),u16(0),u16(0),u16(0),u16(0),u32(c.crc),u32(c.size),u32(c.size),u16(c.n.length),u16(0),u16(0),u16(0),u16(0),u32(0),u32(c.off)];
  parts.push.apply(parts,ch);parts.push(c.n);cdLen+=46+c.n.length;
 });
 parts.push(u32(0x06054b50),u16(0),u16(0),u16(central.length),u16(central.length),u32(cdLen),u32(cdStart),u16(0));
 return new Blob(parts,{type:'application/zip'});
}
function prox(u){return 'https://wsrv.nl/?url='+encodeURIComponent(u);}
go.onclick=async function(){

 for(var i=0;i<A.length;i++){
