h+='<div class="km-vessel">Vessel: '+E(ka.vessel||'Unknown')+'</div></div></div>';
var kstg=ka.stage||1;
var kstgN=['Dormant','Spreading','Horn','Ōtsutsuki'];
var kstgF=['Dormant','Pattern Spreading','Horn Manifestation','Ōtsutsuki'];
h+='<div class="km-stages"><div class="kl">Stage Progression</div><div class="km-stg-bar">';
for(var si=1;si<=4;si++){h+='<div class="km-stg'+(si<kstg?' done':si===kstg?' cur':'')+'"></div>';}
h+='</div><div class="km-stg-labels">';
for(var si=0;si<4;si++){h+='<span class="km-stg-lbl">'+kstgN[si]+'</span>';}
h+='</div></div>';
h+='<div class="km-cur">Current: Stage '+kstg+' — '+kstgF[kstg-1]+'</div>';
if(ka.location||ka.spread){h+='<div class="grid2">';
if(ka.location){h+='<div class="kv"><div class="kl">Location</div><div class="vl">'+E(ka.location)+'</div></div>';}
if(ka.spread){h+='<div class="kv"><div class="kl">Spread</div><div class="vl">'+E(ka.spread)+'</div></div>';}
if(ka.color){h+='<div class="kv"><div class="kl">Color</div><div class="vl">'+E(ka.color)+'</div></div>';}
if(ka.shape){h+='<div class="kv"><div class="kl">Shape</div><div class="vl">'+E(ka.shape)+'</div></div>';}
h+='</div>';}
if(ka.extraction!=null){h+='<hr class="sep"/>'+bar('bar-ka','Ōtsutsuki Overwrite',ka.extraction,100);
var kpct=ka.extraction||0;
var kwrn=kpct>=80?'Critical — Ōtsutsuki resurrection imminent':kpct>=50?E(ka.otsutsuki||'Ōtsutsuki')+' consciousness emerging':kpct>=25?E(ka.otsutsuki||'Ōtsutsuki')+' extraction progressing':'Extraction minimal';
h+='<div style="font-family:\'M PLUS 1\',sans-serif;font-size:9px;font-weight:700;color:'+(kpct>=80?'#cc3333':kpct>=50?'#cc6633':'#2e6b8a')+';">'+kpct+'% — '+kwrn+'</div>';}
if(ka.abilities&&ka.abilities.length){h+='<hr class="sep"/><div class="kl">Kāma Abilities</div><div class="km-tags">';
ka.abilities.forEach(function(a){
var an=typeof a==='string'?a:a.name;
var dng=typeof a==='object'&&a.dangerous;
h+='<span class="km-tag'+(dng?' dng':'')+'">'+E(an)+'</span>';});
h+='</div>';}
if(ka.warning){h+='<div class="card" style="border-color:rgba(46,107,138,.25);background:rgba(46,107,138,.04);margin-top:8px"><div class="cn" style="font-size:10px;color:#2e6b8a">⚠ Karma Warning</div><div class="cd" style="font-size:9.5px;color:#6a4a28;line-height:1.4;margin-top:2px">'+E(ka.warning)+'</div></div>';}
h+=secF();}

h+='</div>';
body.innerHTML=h;
document.querySelectorAll('.sec').forEach(function(s){s.querySelector('.sec-h').addEventListener('click',function(){s.classList.toggle('open');});});
})();
</script>
</body>
</html>
