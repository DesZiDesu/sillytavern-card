<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#1a1a2e;font-family:'Segoe UI',sans-serif;padding:20px;color:#e8d5b0}
h1{text-align:center;color:#e8d5b0;margin-bottom:10px;font-size:20px}
.subtitle{text-align:center;color:#999;font-size:12px;margin-bottom:30px}
.test-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:20px;max-width:1400px;margin:0 auto}
.status-card{background:linear-gradient(180deg,#faf3e6,#f5ead4);border-radius:12px;padding:16px;border:1px solid #d4c4a0;box-shadow:0 2px 8px rgba(0,0,0,.3)}

.char-name{font-size:16px;font-weight:bold;color:#4a3a20;margin-bottom:4px}
.char-info{font-size:11px;color:#8a7a5a;margin-bottom:12px}
.eye-row{display:flex;gap:12px;justify-content:center}
.eye-slot{text-align:center;flex:1;padding:8px;background:rgba(139,119,80,.06);border-radius:8px;border:1px solid rgba(139,119,80,.12)}
.eye-slot.blind{opacity:.5}
.el{font-size:9px;text-transform:uppercase;letter-spacing:.5px;color:#8a7a5a;margin-bottom:4px}
.ek{font-size:32px;color:#6a4a28;margin:4px 0}
.ek svg{display:block;margin:0 auto}
.en{font-size:11px;color:#6a4a28;font-weight:500;margin-top:4px}
.es{font-size:9px;margin-top:2px}
.es.active{color:#2a8a2a}
.es.sealed{color:#cc8800}
.es.blind-t{color:#cc3333}
.blind-x{font-size:28px;color:#cc3333;margin:4px 0}
.section-title{font-size:14px;color:#ffd700;margin:30px 0 15px;text-align:center;border-top:1px solid #333;padding-top:15px}
</style>

function renderEyeSlot(label, kanji_label, eye) {
    var h = '';
    if (!eye) return '<div class="eye-slot blind"><div class="el">'+E(label)+'</div><div class="ek" style="color:#cbb088">—</div><div class="en" style="color:#999">None</div></div>';
    var bl = eye.state === 'blind' || eye.state === 'stolen';
    h += '<div class="eye-slot'+(bl?' blind':'')+'"><div class="el">'+E(label)+' '+E(kanji_label)+'</div>';
    if (bl) {
        h += '<div class="blind-x">✕</div><div class="en" style="color:#999">'+E(eye.state==='stolen'?'Stolen':'Blind')+'</div><div class="es blind-t">● '+E(eye.state==='stolen'?'Stolen':'Blind')+'</div>';
    } else {
        var _sv = eyeSvg(eye.type);
        if (_sv) { h += '<div class="ek" style="line-height:0">' + _sv + '</div>'; }
        else { h += '<div class="ek">' + E(eye.kanji || '◉') + '</div>'; }
        h += '<div class="en">'+E(eye.name||'—')+'</div><div class="es '+(eye.state==='sealed'?'sealed':'active')+'">● '+E(eye.state==='sealed'?'Sealed':'Active')+'</div>';
    }
    h += '</div>';
    return h;
}

function renderCard(title, info, leftEye, rightEye) {
    return '<div class="status-card"><div class="char-name">' + E(title) + '</div><div class="char-info">' + E(info) + '</div><div class="card-title">Dōjutsu Status</div><div class="eye-row">' +
        renderEyeSlot('Left Eye', '左眼', leftEye) + renderEyeSlot('Right Eye', '右眼', rightEye) + '</div></div>';
}
