<!DOCTYPE html><html><head><meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Rubik:wght@400;500;600;700;800;900&family=Noto+Sans+Thai:wght@400;500;600;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
html,body{background:transparent;font-family:'Rubik','Noto Sans Thai',sans-serif;-webkit-font-smoothing:antialiased}
#wrap{max-width:480px;margin:14px auto;padding:0 6px}
#card{position:relative;background:#0a0a0d;border:1px solid #26262b;border-radius:14px;overflow:hidden;box-shadow:0 12px 34px rgba(0,0,0,.6)}
/* top bar */
#tb{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:10px 14px;background:#101013;border-bottom:1px solid #26262b}
#tbL{display:flex;align-items:center;gap:8px;font:800 11px 'Rubik',sans-serif;color:#d3fd51;letter-spacing:.16em;text-transform:uppercase}
#tbL svg{width:17px;height:17px;stroke:#d3fd51;fill:none;stroke-width:1.7;stroke-linecap:round;stroke-linejoin:round}
#tbL span b{color:#ff7a33;font-weight:800}
#tbR{font:9.5px 'Share Tech Mono',monospace;color:#8f8f96;letter-spacing:.1em;text-align:right;line-height:1.5}
#tbR b{color:#d3fd51;font-weight:400}
/* tv wall */
#wall{position:relative;display:grid;grid-template-columns:repeat(5,1fr);gap:7px;padding:12px;
background-image:radial-gradient(rgba(255,255,255,.035) 1px,transparent 1.4px);background-size:13px 13px}
.tv{position:relative;aspect-ratio:1/.82;background:#141418;border:1px solid #2a2a30;border-radius:7px;overflow:hidden}
.tv::before{content:'';position:absolute;inset:0;background:repeating-linear-gradient(0deg,rgba(255,255,255,.05) 0 1px,transparent 1px 3px);pointer-events:none}
.tv.st::after{content:'';position:absolute;inset:0;background:repeating-linear-gradient(0deg,rgba(255,255,255,.09) 0 2px,rgba(0,0,0,.16) 2px 4px);animation:stx .35s steps(3) infinite;opacity:.5}
@keyframes stx{from{transform:translateY(0)}to{transform:translateY(4px)}}
.tv .mi{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;opacity:.4}
.tv .mi svg{width:46%;height:46%;stroke:#7d7d85;fill:none;stroke-width:1.7;stroke-linecap:round;stroke-linejoin:round}
#big{position:relative;grid-column:2/5;grid-row:1/3;aspect-ratio:auto;background:#101014;border:2px solid var(--tc,#d3fd51);border-radius:10px;overflow:hidden;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;padding:14px 12px;
box-shadow:0 0 26px color-mix(in srgb,var(--tc,#d3fd51) 30%,transparent),inset 0 0 40px rgba(0,0,0,.55);animation:tvon .5s ease-out both}
@keyframes tvon{0%{filter:brightness(3.2);transform:scaleY(.02)}38%{filter:brightness(2.4);transform:scaleY(1.02)}100%{filter:brightness(1);transform:scaleY(1)}}
#big::before{content:'';position:absolute;inset:0;background:repeating-linear-gradient(0deg,rgba(255,255,255,.06) 0 1px,transparent 1px 3px);pointer-events:none}
#big::after{content:'';position:absolute;left:0;right:0;height:26%;top:-30%;background:linear-gradient(rgba(255,255,255,.10),transparent);animation:sweep 3.4s linear infinite;pointer-events:none}
@keyframes sweep{to{top:120%}}
#bigIc svg{width:52px;height:52px;stroke:var(--tc,#d3fd51);fill:none;stroke-width:1.6;stroke-linecap:round;stroke-linejoin:round;filter:drop-shadow(0 0 10px color-mix(in srgb,var(--tc,#d3fd51) 60%,transparent))}
#bigT{font:900 16px 'Rubik','Noto Sans Thai',sans-serif;color:var(--tc,#d3fd51);letter-spacing:.08em;text-transform:uppercase;transform:skewX(-6deg);text-align:center;line-height:1.3;text-shadow:0 0 14px color-mix(in srgb,var(--tc,#d3fd51) 50%,transparent)}
#bigS{font:9px 'Share Tech Mono',monospace;color:#8f8f96;letter-spacing:.24em;text-transform:uppercase}
/* eous */
#boo{position:absolute;right:10px;bottom:8px;display:flex;align-items:center;gap:5px;opacity:.85}
#boo svg{width:24px;height:25px}
#boo b{font:800 7.5px 'Rubik',sans-serif;color:#6f6f76;letter-spacing:.2em}
/* console line */
#con{margin:2px 12px 0;padding:9px 12px;background:#101013;border:1px solid #26262b;border-radius:8px;font:11.5px 'Share Tech Mono',monospace;color:#c9e88a;line-height:1.6;white-space:pre-wrap;word-wrap:break-word}
#con::before{content:'▸ ';color:#ff7a33}
#cur{display:inline-block;width:7px;height:12px;background:#d3fd51;vertical-align:-1px;margin-left:3px;animation:bl 1s steps(1) infinite}
@keyframes bl{50%{opacity:0}}
/* choices */
#ch{display:flex;gap:8px;flex-wrap:wrap;padding:11px 12px 13px}
.chb{display:flex;align-items:center;gap:7px;font:700 11px 'Rubik','Noto Sans Thai',sans-serif;letter-spacing:.06em;color:#d3fd51;background:rgba(211,253,81,.07);border:1.5px solid rgba(211,253,81,.55);padding:7px 13px;border-radius:5px;transform:skewX(-8deg);text-transform:uppercase}
.chb svg{width:13px;height:13px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.chb small{font:9px 'Share Tech Mono',monospace;color:#6f6f76;letter-spacing:0}
.hide{display:none!important}
</style></head><body>
<textarea id="raw" style="display:none">
{
 "ui_lang":"en","zone":"Hollow — Sixth Street Underside","step":"07","depth":"B2",
 "event":{"icon":"encounter","type":"danger","title":"Ambush!","text":"Static floods the feed... Ethereals closing in from the maintenance shaft. Eous's ears are folding back."},
 "grid":["loot","","enemy","","exit","","key",""],
 "choices":[
   {"icon":"fight","label":"Engage"},
   {"icon":"run","label":"Fall back","hint":"to B1"},
   {"icon":"boo","label":"Send Eous"}
 ]
}
</textarea>
<div id="wrap"><div id="card">
 <div id="tb">
  <span id="tbL"><svg viewBox="0 0 24 24"><rect x="2.5" y="6" width="19" height="14" rx="2.5"/><path d="M8 6 5 2.5M16 6l3-3.5"/><path d="M6.5 13h3l1.5-3 2.5 6 1.5-3h2.5"/></svg><span>TV <b>Mode</b></span></span>
  <span id="tbR"><span id="zn"></span><br><b id="stp"></b></span>
 </div>
 <div id="wall"></div>
 <div id="con"><span id="conT"></span><span id="cur"></span></div>
 <div id="ch"></div>
</div></div>
<script>
(function(){
 function g(id){return document.getElementById(id);}
 function esc(s){return String(s==null?'':s).replace(/[<>&]/g,function(x){return{'<':'&lt;','>':'&gt;','&':'&amp;'}[x];});}
 function has(v){return v!=null&&String(v).trim()!=='';}
 var raw=(g('raw').value||'').replace(/<\/?ZZZ_TV>/gi,'').trim();
 var D={};try{if(raw&&raw.charAt(0)==='{')D=JSON.parse(raw);}catch(e){}
 var th=(D.ui_lang==='th');function L(en,t){return th?t:en;}
 var IC={
  encounter:'<path d="M4 20 14 8M20 20 10 8M8 5l4 4 4-4M12 9V4"/><path d="M3 21l3-1-2-2zM21 21l-3-1 2-2z"/>',
  enemy:'<circle cx="12" cy="11" r="7"/><path d="M9 9.5h.01M15 9.5h.01M9.5 14c1.5-1.2 3.5-1.2 5 0M5.5 5.5 4 3M18.5 5.5 20 3"/>',
  boss:'<circle cx="12" cy="12" r="7"/><path d="M8.5 10h.01M15.5 10h.01M9 15.5c2-1.6 4-1.6 6 0M5 6 2 2.5M19 6l3-3.5M12 5V2"/>',
  loot:'<rect x="4" y="9" width="16" height="11" rx="2"/><path d="M4 13h16M12 9v11M8 9c-2-5 6-5 4 0M16 9c2-5-6-5-4 0"/>',
  key:'<circle cx="8" cy="12" r="4"/><path d="M12 12h9M18 12v4M15 12v3"/>',
  rest:'<path d="M5 19V9l7-5 7 5v10"/><path d="M9 19v-5h6v5M3 19h18"/>',
  shop:'<path d="M4 7h16l-1.5 12h-13z"/><path d="M9 10V6a3 3 0 0 1 6 0v4"/>',
  heal:'<circle cx="12" cy="12" r="8.5"/><path d="M12 8v8M8 12h8"/>',
  trap:'<path d="M12 3 22 20H2z"/><path d="M12 10v4.5M12 17.5h.01"/>',
  event:'<circle cx="12" cy="12" r="8.5"/><path d="M9.5 9.5a2.5 2.5 0 1 1 3.4 2.3c-.8.3-.9 1-.9 1.7M12 17h.01"/>',
  exit:'<path d="M14 4h6v16h-6"/><path d="M3 12h11M10 8l4 4-4 4"/>',
  fight:'<path d="M4 20 14 8M20 20 10 8M8 5l4 4 4-4M12 9V4"/>',
  run:'<path d="M13 5a1.8 1.8 0 1 0 0-.01M6 20l3-6 3-2-1-5 4 2 2 3h3M9 12l-4 2M12 17l3 3"/>',
  talk:'<path d="M4 5h16v11H9l-5 4z"/><path d="M8 9h8M8 12h5"/>',
  boo:'<path d="M8 7Q6 1 10 3.5L11.5 6M16 7q2-6-2-3.5L12.5 6"/><rect x="5" y="6" width="14" height="13.5" rx="4"/><circle cx="10" cy="12" r="1.6"/><circle cx="14" cy="12" r="1.6"/>'
 };
 function icon(k){k=String(k||'').toLowerCase();return '<svg viewBox="0 0 24 24">'+(IC[k]||IC.event)+'</svg>';}
 var TC={danger:'#ff5d5d',warn:'#ffb164',loot:'#d3fd51',info:'#8fe9ff',exit:'#d3fd51',boss:'#ff7a33'};
 g('zn').textContent=has(D.zone)?D.zone:L('HOLLOW','ฮอลโลว์');
 g('stp').textContent=L('STEP','ก้าวที่')+' '+(has(D.step)?D.step:'--')+(has(D.depth)?' · '+D.depth:'');
 var E=D.event||{};
 var tc=TC[String(E.type||'').toLowerCase()]||'#d3fd51';
 // wall: 10 small slots around a 3x2 big tv (5 cols x 3 rows => big takes cols 2-4 rows 1-2)
 var Gd=Array.isArray(D.grid)?D.grid:[];
 var slots=9, hh='', bi=0;
 hh+=tvSmall(0);hh+='<div id="big" style="--tc:'+tc+'"><span id="bigIc">'+icon(E.icon)+'</span><span id="bigT">'+esc(has(E.title)?E.title:'...')+'</span><span id="bigS">'+L('SIGNAL LOCKED','ล็อกสัญญาณแล้ว')+'</span></div>';hh+=tvSmall(1);
 hh+=tvSmall(2);hh+=tvSmall(3);
 for(var i=4;i<slots;i++)hh+=tvSmall(i);
 function tvSmall(i){var k=Gd[i];var inner=(k!=null&&String(k).trim()!=='')?'<span class="mi">'+icon(k)+'</span>':'';return '<div class="tv st">'+inner+'</div>';}
 g('wall').innerHTML=hh+'<span id="boo"><svg viewBox="0 0 24 25" fill="none" stroke="#8f8f96" stroke-width="1.6" stroke-linecap="round"><path d="M8 7Q6 1 10 3.5L11.5 6M16 7q2-6-2-3.5L12.5 6"/><rect x="5" y="6" width="14" height="13.5" rx="4"/><circle cx="10" cy="12" r="1.4" fill="#d3fd51" stroke="none"/><circle cx="14" cy="12" r="1.4" fill="#d3fd51" stroke="none"/></svg><b>EOUS</b></span>';
 g('conT').textContent=has(E.text)?E.text:L('Awaiting input…','รอคำสั่ง…');
 var C=Array.isArray(D.choices)?D.choices:[];
 if(C.length){var h2='';
  for(var i=0;i<C.length;i++){var c=C[i]||{};
   h2+='<span class="chb">'+icon(c.icon||'event')+esc(c.label)+(has(c.hint)?'<small>'+esc(c.hint)+'</small>':'')+'</span>';}
  g('ch').innerHTML=h2;
 }else g('ch').classList.add('hide');
})();
</script>
</body></html>
