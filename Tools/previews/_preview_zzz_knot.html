<!DOCTYPE html><html><head><meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Rubik:wght@400;500;600;700;800&family=Noto+Sans+Thai:wght@400;500;600;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
html,body{background:transparent;font-family:'Rubik','Noto Sans Thai',sans-serif;-webkit-font-smoothing:antialiased}
#wrap{max-width:480px;margin:14px auto;padding:0 6px}
#card{position:relative;background:#141417;border:1px solid #2c2c30;border-radius:14px;overflow:hidden;box-shadow:0 10px 30px rgba(0,0,0,.5)}
/* header */
#hd{position:relative;display:flex;align-items:center;justify-content:space-between;padding:11px 14px;background:#0e0e10;border-bottom:1px solid #303036;overflow:hidden}
#hd::before{content:'';position:absolute;right:-20px;top:-30px;width:130px;height:130px;background:radial-gradient(rgba(255,122,51,.16) 1.5px,transparent 2px);background-size:11px 11px;transform:rotate(18deg)}
#lg{display:flex;align-items:center;gap:9px}
#lg svg{width:24px;height:24px}
#lgT{font:800 13px 'Rubik',sans-serif;color:#ff7a33;letter-spacing:.16em;text-transform:uppercase}
#lgT small{display:block;font:9px 'Share Tech Mono',monospace;color:#6f6f76;letter-spacing:.1em;margin-top:2px;text-transform:none}
#hdR{position:relative;text-align:right;font:10px 'Share Tech Mono',monospace;color:#8f8f96;letter-spacing:.1em;line-height:1.5}
#hdR b{color:#d3fd51;font-weight:400}
/* post */
#post{padding:13px 14px 11px;background-image:repeating-linear-gradient(135deg,rgba(255,255,255,.015) 0 9px,transparent 9px 18px)}
#bdg{display:flex;gap:6px;margin-bottom:8px}
.bdg{font:800 9px 'Rubik','Noto Sans Thai',sans-serif;letter-spacing:.12em;text-transform:uppercase;padding:3px 9px;border-radius:3px;transform:skewX(-8deg)}
.bdg.pin{background:#d3fd51;color:#141408}
.bdg.hot{background:#ff7a33;color:#1c0e04}
#pT{color:#f4f4f6;font-weight:800;font-size:15.5px;line-height:1.4;letter-spacing:.01em}
#meta{display:flex;align-items:center;gap:9px;margin-top:10px}
.av{width:32px;height:32px;flex-shrink:0;border-radius:50%;overflow:hidden;background:#26262b;border:2px solid var(--hx,#ff7a33);display:flex;align-items:center;justify-content:center}
.av img{width:100%;height:100%;object-fit:cover;display:block}
.av .ini{width:100%;height:100%;display:flex;align-items:center;justify-content:center;background:var(--hx,#ff7a33);font-weight:800;font-size:13px;color:#141408}
.av svg{width:78%;height:78%}
#mN{min-width:0}
#mU{color:#f2f2f4;font-weight:700;font-size:12.5px;display:flex;align-items:center;gap:6px}
.op{font:800 8px 'Rubik',sans-serif;background:#ff7a33;color:#1c0e04;padding:2px 6px;border-radius:2px;letter-spacing:.1em}
#mT{font:9.5px 'Share Tech Mono',monospace;color:#7d7d85;margin-top:2px;letter-spacing:.06em}
#pB{margin-top:10px;color:#c9c9cf;font-size:13px;line-height:1.65;white-space:pre-wrap;word-wrap:break-word}
#pI{margin-top:10px}
#pI img{display:block;max-width:100%;border-radius:9px;border:1px solid #2e2e33}
#tags{display:flex;gap:6px;flex-wrap:wrap;margin-top:10px}
.tag{font:600 10px 'Rubik','Noto Sans Thai',sans-serif;color:#ffb164;border:1px solid rgba(255,122,51,.5);padding:3px 10px;border-radius:20px;letter-spacing:.04em}
#stats{display:flex;align-items:center;gap:16px;margin-top:11px;padding-top:10px;border-top:1px dashed #2e2e33;font:10.5px 'Share Tech Mono',monospace;color:#8f8f96;letter-spacing:.06em}
#stats svg{width:13px;height:13px;stroke:currentColor;fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round;vertical-align:-2px;margin-right:5px}
#stats .lk{color:#d3fd51}
/* commission attach */
#cms{margin:0 14px 12px;padding:10px 12px;background:rgba(255,122,51,.07);border:1px solid rgba(255,122,51,.4);border-left:4px solid #ff7a33;border-radius:8px;display:flex;align-items:center;gap:11px}
#cms svg{width:24px;height:24px;stroke:#ff7a33;fill:none;stroke-width:1.7;stroke-linecap:round;stroke-linejoin:round;flex-shrink:0}
#cmsM{flex:1;min-width:0}
#cmsL{font:800 8.5px 'Rubik','Noto Sans Thai',sans-serif;color:#ff9a5c;letter-spacing:.16em;text-transform:uppercase}
#cmsT{color:#f4f4f6;font-weight:700;font-size:12.5px;margin-top:2px;line-height:1.35}
#cmsR{font:10px 'Share Tech Mono',monospace;color:#d3fd51;margin-top:3px;letter-spacing:.04em}
#cmsBtn{flex-shrink:0;font:800 10px 'Rubik','Noto Sans Thai',sans-serif;letter-spacing:.1em;text-transform:uppercase;color:#1c0e04;background:#ff7a33;padding:8px 13px;border-radius:4px;transform:skewX(-8deg);box-shadow:0 0 12px rgba(255,122,51,.3)}
/* comments */
#cwr{border-top:1px solid #26262b;padding:10px 14px 12px}
#cl{font:800 9px 'Rubik','Noto Sans Thai',sans-serif;color:#8f8f96;letter-spacing:.2em;text-transform:uppercase}
#cl b{color:#d3fd51}
.cm{display:flex;gap:9px;margin-top:11px}
.cm .av{width:26px;height:26px;border-width:1.5px}
.cm .av .ini{font-size:11px}
.cmB{flex:1;min-width:0}
.cmU{font-weight:700;font-size:11.5px;color:#e8e8ea;display:flex;align-items:center;gap:6px}
.cmU .you{font:800 8px 'Rubik',sans-serif;background:#d3fd51;color:#141408;padding:2px 6px;border-radius:2px;letter-spacing:.1em}
.cmU.me{color:#d3fd51}
.cmT{margin-top:3px;color:#b9b9c0;font-size:12px;line-height:1.55;white-space:pre-wrap;word-wrap:break-word}
.cmM{margin-top:4px;font:9px 'Share Tech Mono',monospace;color:#6f6f76;letter-spacing:.08em}
.cmM b{color:#a7d94a;font-weight:400}
/* reply bar */
#rb{display:flex;align-items:center;gap:8px;margin:12px 14px 13px}
#ri{flex:1;background:#1e1e22;border:1px solid #33333a;border-radius:20px;padding:8px 14px;font-size:11.5px;color:#6f6f76}
#rs{width:32px;height:32px;flex-shrink:0;border-radius:50%;background:#ff7a33;display:flex;align-items:center;justify-content:center}
#rs svg{width:14px;height:14px;stroke:#1c0e04;fill:none;stroke-width:2.2;stroke-linecap:round;stroke-linejoin:round;margin-left:2px}
.hide{display:none!important}
</style></head><body>
<textarea id="raw" style="display:none">
{
 "ui_lang":"en","time":"09:14",
 "post":{
  "user":"Bearded Baldman","anon":true,"hot":true,
  "title":"[HELP] Weird static sounds from the alley behind Godfinger arcade??",
  "body":"Every night around 2AM. My bangboo refuses to walk past it now. Not going to check myself, I've seen how these threads end.\n\nSomebody call a Proxy.",
  "tags":["Sixth Street","Hollow?","Commission"],
  "likes":128,"time":"2H AGO"
 },
 "commission":{"title":"Investigate the alley behind Godfinger","reward":"50,000 Dennies","rank":"B"},
 "comments":[
  {"user":"CaffeineQueen","text":"Not this again. Last time it was just a busted vending machine lol","likes":16,"time":"1H"},
  {"user":"Phaethon","me":true,"text":"Taking a look tonight. Keep your bangboo indoors.","likes":42,"time":"44MIN"},
  {"user":"Anonymous","anon":true,"text":"bro really replied like it's nothing 💀","likes":9,"time":"30MIN"}
 ]
}
</textarea>
<div id="wrap"><div id="card">
 <div id="hd">
  <span id="lg"><svg viewBox="0 0 24 24" fill="none" stroke="#ff7a33" stroke-width="1.9" stroke-linecap="round"><circle cx="12" cy="12" r="8.5"/><path d="M7.5 9.5c3-2.5 6-2.5 9 0M7.5 14.5c3 2.5 6 2.5 9 0M12 3.5v17" opacity=".9"/></svg>
   <span id="lgT">Inter-Knot<small id="lgS"></small></span></span>
  <span id="hdR"><span id="clk"></span><br><b id="brd"></b></span>
 </div>
 <div id="post">
  <span id="bdg"></span>
  <div id="pT"></div>
  <div id="meta"><span class="av" id="pAv"></span><span id="mN"><span id="mU"></span><span id="mT" style="display:block"></span></span></div>
  <div id="pB"></div>
  <div id="pI"></div>
  <div id="tags"></div>
  <div id="stats"><span class="lk"><svg viewBox="0 0 24 24"><path d="M12 4l7 8h-4v8h-6v-8H5z"/></svg><span id="lkN"></span></span><span><svg viewBox="0 0 24 24"><path d="M4 5h16v12H8l-4 4z"/></svg><span id="cmN"></span></span><span style="margin-left:auto;letter-spacing:.18em" id="idL"></span></div>
 </div>
 <div id="cms"><svg viewBox="0 0 24 24"><path d="M6 3h9l3 3v15H6z"/><path d="M9 9h6M9 13h6M9 17h4"/></svg><span id="cmsM"><span id="cmsL"></span><span id="cmsT" style="display:block"></span><span id="cmsR" style="display:block"></span></span><span id="cmsBtn"></span></div>
 <div id="cwr"><span id="cl"></span><div id="cms2"></div></div>
 <div id="rb"><span id="ri"></span><span id="rs"><svg viewBox="0 0 24 24"><path d="M4 12h14M13 6l6 6-6 6"/></svg></span></div>
</div></div>
<script>
(function(){
 function g(id){return document.getElementById(id);}
 function esc(s){return String(s==null?'':s).replace(/[<>&]/g,function(x){return{'<':'&lt;','>':'&gt;','&':'&amp;'}[x];});}
 function has(v){return v!=null&&String(v).trim()!=='';}
 function url(v){v=String(v||'').trim();if(!v)return '';return /^https?:\/\//i.test(v)?v:'https://files.catbox.moe/'+v;}
 var raw=(g('raw').value||'').replace(/<\/?ZZZ_KNOT>/gi,'').trim();
 var D={};try{if(raw&&raw.charAt(0)==='{')D=JSON.parse(raw);}catch(e){}
 var th=(D.ui_lang==='th');function L(en,t){return th?t:en;}
 var P=D.post||{};
 // paper-bag anon avatar (nod to the wiki media icon)
 function bag(){return '<svg viewBox="0 0 40 40"><path d="M10 8 L30 8 L32 30 L28 27 L24 31 L20 27 L16 31 L12 27 L8 30 Z" fill="#d9d9d4" stroke="#1b1b1d" stroke-width="1.6" stroke-linejoin="round"/><path d="M13 8 L14 4" stroke="#1b1b1d" stroke-width="1.6" stroke-linecap="round"/><circle cx="17" cy="18" r="3.4" fill="none" stroke="#1b1b1d" stroke-width="1.4"/><circle cx="24" cy="18" r="3.4" fill="none" stroke="#1b1b1d" stroke-width="1.4"/><path d="M14 18h-1M27 18h1M17 14.6v6.8M24 14.6v6.8M13.8 16.5h6.4M20.8 16.5h6.4M13.8 19.5h6.4M20.8 19.5h6.4" stroke="#1b1b1d" stroke-width="1.1"/></svg>';}
 function avHTML(a,n,anon,hx){
  if(anon||(!has(a)&&!has(n)))return bag();
  if(has(a))return '<img src="'+esc(url(a))+'" alt="" onerror="this.outerHTML=\''+bag().replace(/"/g,'&quot;')+'\'">';
  return '<span class="ini"'+(hx?' style="background:'+esc(hx)+'"':'')+'>'+esc(String(n).charAt(0).toUpperCase())+'</span>';
 }
 g('lgS').textContent='// '+L('ANONYMOUS BOARD','บอร์ดนิรนาม');
 g('clk').textContent=has(D.time)?D.time:'--:--';
 g('brd').textContent=L('LIVE','สด');
 // badges
 var b='';
 if(P.pinned)b+='<span class="bdg pin">'+L('PINNED','ปักหมุด')+'</span>';
 if(P.hot)b+='<span class="bdg hot">'+L('HOT','มาแรง')+'</span> ';
 if(b){g('bdg').innerHTML=b;g('bdg').style.display='flex';}else g('bdg').classList.add('hide');
 g('pT').textContent=has(P.title)?P.title:L('(untitled post)','(ไม่มีหัวข้อ)');
 var un=P.anon?L('Anonymous','นิรนาม'):(has(P.user)?P.user:L('Anonymous','นิรนาม'));
 g('pAv').innerHTML=avHTML(P.avatar,un,P.anon,P.hex);
 if(has(P.hex))g('pAv').style.setProperty('--hx',P.hex);
 g('mU').innerHTML=esc(un)+'<span class="op">OP</span>';
 g('mT').textContent=(has(P.time)?P.time:'')+(P.anon?' · '+L('ID HIDDEN','ซ่อนตัวตน'):'');
 if(has(P.body))g('pB').textContent=P.body;else g('pB').classList.add('hide');
 if(has(P.img))g('pI').innerHTML='<img src="'+esc(url(P.img))+'" alt="" onerror="this.parentNode.style.display=\'none\'">';else g('pI').classList.add('hide');
 var T=Array.isArray(P.tags)?P.tags:[];
 if(T.length){var h='';for(var i=0;i<T.length;i++)h+='<span class="tag"># '+esc(T[i])+'</span>';g('tags').innerHTML=h;}
 else g('tags').classList.add('hide');
 var C=Array.isArray(D.comments)?D.comments:[];
 g('lkN').textContent=(P.likes!=null?P.likes:0);
 g('cmN').textContent=C.length;
 g('idL').textContent=L('INTER-KNOT','อินเตอร์-นอต');
 // commission attach
 var cm=D.commission||{};
 if(has(cm.title)){
  g('cmsL').textContent=L('Attached commission','ภารกิจแนบมา')+(has(cm.rank)?' · '+L('RANK','แรงค์')+' '+cm.rank:'');
  g('cmsT').textContent=cm.title;
  if(has(cm.reward))g('cmsR').textContent='▸ '+cm.reward;else g('cmsR').classList.add('hide');
  g('cmsBtn').textContent=L('View','ดูงาน');
 }else g('cms').classList.add('hide');
 // comments
 if(C.length){
  g('cl').innerHTML=L('Replies','ความคิดเห็น')+' // <b>'+C.length+'</b>';
  var h2='';
  for(var i=0;i<C.length;i++){var c=C[i]||{};
   var cn=c.anon?L('Anonymous','นิรนาม'):(has(c.user)?c.user:L('Anonymous','นิรนาม'));
   h2+='<div class="cm"><span class="av"'+(has(c.hex)?' style="--hx:'+esc(c.hex)+'"':(c.me?' style="--hx:#d3fd51"':''))+'>'+avHTML(c.avatar,cn,c.anon,c.hex)+'</span><span class="cmB">'
     +'<span class="cmU'+(c.me?' me':'')+'">'+esc(cn)+(c.me?'<span class="you">'+L('YOU','คุณ')+'</span>':'')+'</span>'
     +'<span class="cmT" style="display:block">'+esc(c.text)+'</span>'
     +'<span class="cmM" style="display:block">'+(has(c.time)?esc(c.time)+' · ':'')+'<b>▲ '+(c.likes!=null?c.likes:0)+'</b></span>'
     +'</span></div>';}
  g('cms2').innerHTML=h2;
 }else{g('cl').innerHTML=L('Replies','ความคิดเห็น')+' // <b>0</b>';}
 g('ri').textContent=L('Add a reply…','ตอบกลับ…');
})();
</script>
</body></html>
