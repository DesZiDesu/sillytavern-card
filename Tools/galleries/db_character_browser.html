<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Dragon Ball — Character Gallery Browser</title>
<style>
:root{--ground:#070d14;--grid:rgba(41,211,255,.045);--panel:rgba(11,28,43,.72);--panel2:rgba(7,15,24,.6);
 --line:#173a4f;--line2:#122c3d;--ink:#eaf4f8;--dim:#a6c0cd;--muted:#5f7d90;--cyan:#3fdcff;--cyan2:#1a8fc4;
 --gold:#ff9a2e;--gold2:#ffc06a;--green:#46da7c;--shadow:0 16px 38px rgba(0,0,0,.5)}
@media(prefers-color-scheme:light){:root{--ground:#e9eef1;--grid:rgba(20,90,130,.05);--panel:#fff;--panel2:#f2f7f9;
 --line:#cdd9e0;--line2:#dde6ea;--ink:#0f2028;--dim:#3b5765;--muted:#6c8593;--cyan:#0d7ba9;--cyan2:#0a5f84;
 --gold:#d1690a;--gold2:#b1560a;--green:#1f9d55;--shadow:0 12px 30px rgba(20,50,70,.15)}}
*{box-sizing:border-box}
body{margin:0;background:radial-gradient(120% 80% at 50% -8%,color-mix(in srgb,var(--cyan) 7%,transparent),transparent 60%),
 linear-gradient(var(--grid) 1px,transparent 1px) 0 0/34px 34px,linear-gradient(90deg,var(--grid) 1px,transparent 1px) 0 0/34px 34px,var(--ground);
 color:var(--ink);font-family:system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;-webkit-font-smoothing:antialiased}
.disp{font-family:"Arial Narrow","Roboto Condensed","Helvetica Neue",system-ui,sans-serif}
.mono{font-family:ui-monospace,"SF Mono",Consolas,monospace}
.wrap{max-width:1160px;margin:0 auto;padding:18px 14px 60px}
/* header */
.top{position:sticky;top:0;z-index:20;background:linear-gradient(180deg,var(--ground) 78%,transparent);padding:12px 0 10px;margin-bottom:6px}
.bar{background:linear-gradient(120deg,var(--panel),var(--panel2));border:1px solid var(--line);box-shadow:var(--shadow);
 padding:12px 15px;clip-path:polygon(0 0,100% 0,100% 80%,98% 100%,0 100%);display:flex;flex-wrap:wrap;gap:12px;align-items:center}
.brand{display:flex;align-items:center;gap:11px;min-width:0}
.ball{width:30px;height:30px;flex:0 0 30px;border-radius:50%;position:relative;
 background:radial-gradient(circle at 30% 24%,#ffe27a 0 16%,#ffb232 35%,#f28a16 70%,#c9580c 100%);box-shadow:0 0 12px rgba(245,140,22,.4)}
.ball:before{content:"";position:absolute;left:50%;top:50%;width:11px;height:11px;transform:translate(-50%,-50%);
 background:#cf1f17;clip-path:polygon(50% 0,61% 34%,98% 35%,68% 56%,79% 91%,50% 70%,21% 91%,32% 56%,2% 35%,39% 34%)}
.brand b{font:800 17px/1 "Arial Narrow","Roboto Condensed",system-ui;letter-spacing:.03em;text-transform:uppercase;color:var(--ink);display:block}
.brand span{font:700 8px/1.3 ui-monospace,monospace;letter-spacing:.2em;text-transform:uppercase;color:var(--muted)}
.count{margin-left:auto;font:700 10px/1 ui-monospace,monospace;letter-spacing:.1em;color:var(--muted);text-transform:uppercase;white-space:nowrap}
.count b{color:var(--gold);font-size:14px}
.search{flex:1 1 240px;min-width:180px;display:flex;align-items:center;gap:8px;background:var(--panel2);border:1px solid var(--line);
 border-radius:4px;padding:8px 11px}
.search input{flex:1;border:0;background:transparent;color:var(--ink);font:600 14px system-ui;outline:0}
.search svg{width:15px;height:15px;color:var(--muted);flex:0 0 auto}
/* overview grid */
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(126px,1fr));gap:10px}
.tile{cursor:pointer;background:linear-gradient(160deg,var(--panel),var(--panel2));border:1px solid var(--line);
 overflow:hidden;clip-path:polygon(0 0,100% 0,100% 92%,94% 100%,0 100%);transition:transform .15s,border-color .15s}
.tile:hover,.tile:focus-visible{transform:translateY(-3px);border-color:var(--cyan);outline:0}
.thumb{aspect-ratio:1/1;background:#05070a;position:relative;overflow:hidden}
.thumb img{width:100%;height:100%;object-fit:cover;display:block}
.tag{position:absolute;top:6px;right:6px;font:700 8.5px/1 ui-monospace,monospace;letter-spacing:.04em;padding:3px 7px;
 background:rgba(4,12,18,.82);color:var(--gold2);border-radius:2px}
.tag.era{color:#06131b;background:linear-gradient(180deg,var(--cyan),var(--cyan2))}
.tname{padding:8px 9px 10px;font:800 12.5px/1.1 "Arial Narrow","Roboto Condensed",system-ui;letter-spacing:.02em;
 text-transform:uppercase;color:var(--ink)}
.sec{margin:22px 0 11px;display:flex;align-items:center;gap:10px}
.sec b{font:800 12px/1 "Arial Narrow","Roboto Condensed",system-ui;letter-spacing:.14em;text-transform:uppercase;color:var(--cyan)}
.sec i{flex:1;height:1px;background:linear-gradient(90deg,color-mix(in srgb,var(--cyan) 40%,transparent),transparent)}
.sec span{font:700 10px/1 ui-monospace,monospace;color:var(--muted)}
.empty{color:var(--muted);padding:30px 4px;text-align:center;font-size:13px}
/* detail */
.detail{display:none}
.back{display:inline-flex;align-items:center;gap:7px;cursor:pointer;background:var(--panel2);border:1px solid var(--line);
 color:var(--dim);font:700 10px/1 ui-monospace,monospace;letter-spacing:.1em;text-transform:uppercase;padding:9px 13px;
 clip-path:polygon(8% 0,100% 0,92% 100%,0 100%);margin-bottom:14px}
.back:hover{border-color:var(--cyan);color:var(--cyan)}
.dhead{font:800 clamp(24px,6vw,38px)/1 "Arial Narrow","Roboto Condensed",system-ui;letter-spacing:.02em;text-transform:uppercase;color:var(--ink);margin:0 0 4px}
.dsub{font:700 10px/1 ui-monospace,monospace;letter-spacing:.14em;text-transform:uppercase;color:var(--muted);margin-bottom:15px}
.eras{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:16px}
.eras button{cursor:pointer;border:1px solid var(--line);background:var(--panel2);color:var(--dim);
 font:800 11px/1 "Arial Narrow","Roboto Condensed",system-ui;letter-spacing:.05em;text-transform:uppercase;padding:9px 15px;
 clip-path:polygon(9% 0,100% 0,91% 100%,0 100%)}
.eras button.on{color:#06131b;background:linear-gradient(180deg,var(--cyan),var(--cyan2));border-color:var(--cyan)}
.forms{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:11px}
.form{background:linear-gradient(160deg,var(--panel),var(--panel2));border:1px solid var(--line);overflow:hidden;cursor:pointer;
 clip-path:polygon(0 0,100% 0,100% 94%,96% 100%,0 100%);transition:transform .15s,border-color .15s}
.form:hover{transform:translateY(-3px);border-color:var(--gold)}
.form .thumb{aspect-ratio:1/1}
.form .fl{padding:8px 10px 11px;display:flex;gap:7px;align-items:baseline}
.form .fn{font:700 8px/1 ui-monospace,monospace;color:var(--gold);letter-spacing:.05em;flex:0 0 auto}
.form .ft{font:600 12px/1.25 system-ui;color:var(--dim)}
/* lightbox */
.lb{position:fixed;inset:0;z-index:50;background:rgba(3,7,11,.92);display:none;align-items:center;justify-content:center;padding:20px}
.lb.on{display:flex}
.lb figure{margin:0;max-width:min(860px,94vw);max-height:92vh;display:flex;flex-direction:column;gap:10px}
.lb img{max-width:100%;max-height:78vh;object-fit:contain;border:1px solid var(--line);background:#05070a}
.lb figcaption{display:flex;align-items:center;gap:12px;color:var(--ink);font:700 13px system-ui}
.lb figcaption .mono{color:var(--muted);font-weight:600;font-size:11px}
.lb .x{position:absolute;top:16px;right:18px;cursor:pointer;color:#cfe4ee;font-size:26px;line-height:1;background:none;border:0}
.lb .nav{margin-left:auto;display:flex;gap:8px}
.lb .nav button{cursor:pointer;background:var(--panel);border:1px solid var(--line);color:var(--cyan);font-size:16px;
 width:38px;height:34px;border-radius:3px}
@media(prefers-reduced-motion:reduce){*{transition:none!important}}
</style>
</head>

": "", "folder": "shenron", "forms": [{"label": "Shenron Earth", "file": "01_shenron_earth.jpg"}, {"label": "Shenron Daima", "file": "02_shenron_daima.jpg"}]}]}, {"name": "Space Pod", "variants": [{"era": "", "folder": "space_pod", "forms": [{"label": "Img1", "file": "01_img1.jpg"}]}]}], "counts": {"chars": 95, "items": 10, "images": 319, "families": 7}}</script>
<script>
const D=JSON.parse(document.getElementById('data').textContent);
const BASE="../../Sillytavern/Dragon%20Ball/Images/";
const src=(folder,file)=>BASE+folder+"/"+encodeURIComponent(file);
const $=id=>document.getElementById(id);
$('count').innerHTML='<b>'+D.counts.chars+'</b> chars · '+D.counts.images+' imgs';
$('cc').textContent=D.counts.chars+' characters';
$('ic').textContent=D.counts.items+' entries';

function baseThumb(c){const v=c.variants[0];return src(v.folder,v.forms[0].file)}
function totalForms(c){return c.variants.reduce((n,v)=>n+v.forms.length,0)}

function tile(c,i,kind){
  const eras=c.variants.length;
  const badge = eras>1 ? '<span class="tag era">'+eras+' ERAS</span>' : '<span class="tag">'+totalForms(c)+(totalForms(c)>1?' FORMS':' PIC')+'</span>';
  return '<div class="tile" tabindex="0" data-k="'+kind+'" data-i="'+i+'">'+
    '<div class="thumb"><img loading="lazy" src="'+baseThumb(c)+'" alt="'+c.name+'"/>'+badge+'</div>'+
    '<div class="tname">'+c.name+'</div></div>';
}
function renderOverview(f){
  f=(f||'').trim().toLowerCase();
  const cs=D.chars.filter(c=>!f||c.name.toLowerCase().includes(f));
  const is=D.items.filter(c=>!f||c.name.toLowerCase().includes(f));
  $('charGrid').innerHTML = cs.length?cs.map(c=>tile(c,D.chars.indexOf(c),'c')).join(''):'<div class="empty">No matches.</div>';
  $('itemGrid').innerHTML = is.map(c=>tile(c,D.items.indexOf(c),'i')).join('');
  document.querySelectorAll('.grid .tile').forEach(t=>{
    t.onclick=()=>openChar(t.dataset.k,+t.dataset.i);
    t.onkeydown=e=>{if(e.key==='Enter'||e.key===' '){e.preventDefault();t.click()}};
  });
}
let CUR=null,ERA=0;
function openChar(kind,i){
  CUR=(kind==='c'?D.chars:D.items)[i];ERA=0;
  $('overview').style.display='none';$('detail').style.display='block';
  $('dname').textContent=CUR.name;
  $('dsub').textContent=(CUR.variants.length>1?CUR.variants.length+' eras · ':'')+totalForms(CUR)+' portrait'+(totalForms(CUR)>1?'s':'');
  const eb=$('eras');
  if(CUR.variants.length>1){eb.style.display='flex';
    eb.innerHTML=CUR.variants.map((v,x)=>'<button data-x="'+x+'" class="'+(x===0?'on':'')+'">'+(v.era||'Main')+'</button>').join('');
    eb.querySelectorAll('button').forEach(b=>b.onclick=()=>{ERA=+b.dataset.x;
      eb.querySelectorAll('button').forEach(y=>y.classList.toggle('on',y===b));renderForms()});
  } else {eb.style.display='none';eb.innerHTML='';}
  renderForms();window.scrollTo(0,0);
}
function renderForms(){
  const v=CUR.variants[ERA];
  $('forms').innerHTML=v.forms.map((fm,idx)=>
    '<div class="form" data-idx="'+idx+'"><div class="thumb"><img loading="lazy" src="'+src(v.folder,fm.file)+'" alt="'+fm.label+'"/></div>'+
    '<div class="fl"><span class="fn">'+String(idx+1).padStart(2,"0")+'</span><span class="ft">'+fm.label+'</span></div></div>').join('');
  document.querySelectorAll('.form').forEach(el=>el.onclick=()=>lightbox(+el.dataset.idx));
}
function backToOverview(){$('detail').style.display='none';$('overview').style.display='block'}
$('back').onclick=backToOverview;

let LBI=0;
function lightbox(idx){LBI=idx;showLB()}
function showLB(){const v=CUR.variants[ERA],fm=v.forms[LBI];
  $('lbimg').src=src(v.folder,fm.file);$('lbimg').alt=fm.label;
  $('lbcap').innerHTML=CUR.name+' — '+fm.label+' &nbsp;<span class="mono">'+v.folder+'/'+fm.file+'</span>';
  $('lb').classList.add('on');}
$('lbx').onclick=()=>$('lb').classList.remove('on');
$('lb').onclick=e=>{if(e.target===$('lb'))$('lb').classList.remove('on')};
$('lbprev').onclick=e=>{e.stopPropagation();const n=CUR.variants[ERA].forms.length;LBI=(LBI-1+n)%n;showLB()};
$('lbnext').onclick=e=>{e.stopPropagation();const n=CUR.variants[ERA].forms.length;LBI=(LBI+1)%n;showLB()};
document.addEventListener('keydown',e=>{if(!$('lb').classList.contains('on'))return;
  if(e.key==='Escape')$('lb').classList.remove('on');if(e.key==='ArrowLeft')$('lbprev').click();if(e.key==='ArrowRight')$('lbnext').click()});

$('q').addEventListener('input',e=>{if($('detail').style.display==='block')backToOverview();renderOverview(e.target.value)});
renderOverview('');
</script>
</body>
