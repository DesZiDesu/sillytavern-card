<!DOCTYPE html><html><head><meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Rubik:wght@400;500;600;700;800&family=Noto+Sans+Thai:wght@400;500;600;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
html,body{background:transparent;font-family:'Rubik','Noto Sans Thai',sans-serif;-webkit-font-smoothing:antialiased}
#wrap{max-width:520px;margin:14px auto;padding:0 6px}
#card{position:relative;background:#131316;border:1px solid #2c2c30;border-radius:14px;overflow:hidden;box-shadow:0 10px 30px rgba(0,0,0,.5);
background-image:repeating-linear-gradient(135deg,rgba(255,255,255,.018) 0 9px,transparent 9px 18px)}
#card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,#d3fd51 0 42%,#ff7a33 42% 55%,transparent 55%)}
#top{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:12px 14px 10px;border-bottom:1px solid #26262b}
#tL{display:flex;align-items:center;gap:9px}
#sig{width:26px;height:26px;flex-shrink:0}
#sig svg{width:100%;height:100%}
#ttl{font:800 13px 'Rubik',sans-serif;color:#f2f2f4;letter-spacing:.14em;text-transform:uppercase}
#ttl span{color:#d3fd51}
#sub{font:9px 'Share Tech Mono',monospace;color:#6f6f76;letter-spacing:.1em;margin-top:2px}
#tR{text-align:right;font:10px 'Share Tech Mono',monospace;color:#9a9aa2;letter-spacing:.08em;line-height:1.5}
#tR b{color:#d3fd51;font-weight:400}
#grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;padding:10px 12px 4px}
.tile{background:#1b1b1f;border:1px solid #2e2e33;border-radius:9px;padding:9px 11px;min-width:0}
.tile.w2{grid-column:1/-1}
.lab{font:9px 'Share Tech Mono',monospace;color:#8f8f96;letter-spacing:.16em;text-transform:uppercase;display:flex;align-items:center;gap:6px}
.lab svg{width:11px;height:11px;stroke:#8f8f96;fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round;flex-shrink:0}
.val{margin-top:6px;color:#f2f2f4;font-weight:700;font-size:14px;letter-spacing:.02em;line-height:1.3;word-wrap:break-word}
/* time phases */
#ph{display:flex;gap:3px;margin-top:7px}
#ph i{flex:1;text-align:center;font:600 8.5px 'Rubik','Noto Sans Thai',sans-serif;letter-spacing:.06em;color:#6f6f76;background:#232328;border:1px solid #2e2e33;border-radius:4px;padding:4px 0;font-style:normal;text-transform:uppercase}
#ph i.on{background:#d3fd51;border-color:#d3fd51;color:#141408;font-weight:800;box-shadow:0 0 10px rgba(211,253,81,.35);transform:skewX(-6deg)}
#phV{margin-top:7px;display:flex;align-items:center;gap:7px;color:#f2f2f4;font-weight:700;font-size:13px}
#phV svg{width:15px;height:15px;stroke:#d3fd51;fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}
/* dennies */
#dnV{display:flex;align-items:center;gap:7px;margin-top:6px}
#dnI{width:18px;height:18px;border-radius:50%;border:2px solid #d3fd51;color:#d3fd51;display:flex;align-items:center;justify-content:center;font:800 10px 'Rubik',sans-serif;flex-shrink:0}
#dn{font:700 15px 'Share Tech Mono',monospace;color:#d3fd51;letter-spacing:.04em}
/* commission */
#cmB{margin-top:7px;height:6px;background:#26262b;border-radius:2px;overflow:hidden;transform:skewX(-14deg)}
#cmB i{display:block;height:100%;background:linear-gradient(90deg,#ff7a33,#ffb164);width:0}
#cmR{display:flex;align-items:center;justify-content:space-between;gap:8px;margin-top:6px}
#cmT{color:#f2f2f4;font-weight:700;font-size:13px;line-height:1.35;min-width:0}
#cmP{font:11px 'Share Tech Mono',monospace;color:#ffb164;flex-shrink:0}
/* party */
#pt{display:flex;gap:12px;margin-top:8px;flex-wrap:wrap}
.ag{display:flex;flex-direction:column;align-items:center;gap:4px;width:44px}
.ag .av{width:34px;height:34px;border-radius:50%;overflow:hidden;background:#3a3a40;border:2px solid var(--hx,#d3fd51);display:flex;align-items:center;justify-content:center;font-weight:800;font-size:14px;color:#0e0e10}
.ag .av img{width:100%;height:100%;object-fit:cover;display:block}
.ag .av .ini{width:100%;height:100%;display:flex;align-items:center;justify-content:center;background:var(--hx,#d3fd51)}
.ag b{font:500 8.5px 'Rubik','Noto Sans Thai',sans-serif;color:#c9c9cf;max-width:44px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-weight:500}
/* trust + note */
#tc{display:flex;gap:6px;flex-wrap:wrap;margin-top:8px}
.tch{font:600 10px 'Rubik','Noto Sans Thai',sans-serif;padding:4px 10px;border-radius:3px;transform:skewX(-8deg);letter-spacing:.04em}
.tch.up{background:rgba(211,253,81,.12);border:1px solid rgba(211,253,81,.5);color:#d3fd51}
.tch.dn{background:rgba(255,93,93,.1);border:1px solid rgba(255,93,93,.5);color:#ff8d7a}
#note{margin:6px 12px 12px;padding:8px 11px;font:11px 'Share Tech Mono',monospace;color:#9a9aa2;line-height:1.55;background:rgba(255,255,255,.03);border-left:3px solid #d3fd51;border-radius:0 7px 7px 0}
.hide{display:none!important}
</style></head><body>
<textarea id="raw" style="display:none">
{
 "ui_lang":"en","phase":"evening","date":"JUL 08","location":"Sixth Street — Random Play",
 "dennies":48250,
 "commission":{"title":"Roll Camera, Action!","progress":"2/3"},
 "party":[
   {"name":"Nicole","hex":"#e93b81"},
   {"name":"Anby","hex":"#cfd8dc"},
   {"name":"Nekomata","hex":"#ff5d5d"}
 ],
 "trust":[{"name":"Nicole","delta":1},{"name":"Anby","delta":-1}],
 "note":"Nicole is dodging the rent conversation again. HDD signal stable."
}
</textarea>
<div id="wrap"><div id="card">
 <div id="top">
  <div id="tL"><span id="sig"><svg viewBox="0 0 26 26"><rect x="1.5" y="4" width="23" height="17" rx="3" fill="none" stroke="#d3fd51" stroke-width="1.6"/><path d="M8 4 5 1M18 4l3-3" stroke="#d3fd51" stroke-width="1.6" stroke-linecap="round"/><path d="M6 13h3l2-4 3 8 2-4h4" fill="none" stroke="#ff7a33" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"/></svg></span>
   <span><span id="ttl">Proxy <span>Status</span></span><span id="sub" style="display:block">// HDD LINK</span></span></div>
  <span id="tR"><span id="dateL"></span><br><b id="locTop"></b></span>
 </div>
 <div id="grid">
  <div class="tile" id="tTime"><span class="lab"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 2"/></svg><span id="lbTime"></span></span><span id="phV"><svg id="phIc" viewBox="0 0 24 24"></svg><span id="phN"></span></span><span id="ph"></span></div>
  <div class="tile" id="tDen"><span class="lab"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"/><path d="M9 8h4a3 3 0 0 1 0 6H9zM9 8v8"/></svg><span id="lbDen"></span></span><span id="dnV"><span id="dnI">D</span><span id="dn"></span></span></div>
  <div class="tile" id="tLoc"><span class="lab"><svg viewBox="0 0 24 24"><path d="M12 22s7-7 7-12a7 7 0 1 0-14 0c0 5 7 12 7 12z"/><circle cx="12" cy="10" r="2.5"/></svg><span id="lbLoc"></span></span><span class="val" id="loc"></span></div>
  <div class="tile" id="tCm"><span class="lab"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"/><path d="M8 12.5l2.5 2.5L16 9"/></svg><span id="lbCm"></span></span><span id="cmR"><span id="cmT"></span><span id="cmP"></span></span><span id="cmB" style="display:block"><i></i></span></div>
  <div class="tile w2" id="tPt"><span class="lab"><svg viewBox="0 0 24 24"><circle cx="9" cy="8" r="3"/><path d="M3 19c0-3.2 2.8-5 6-5s6 1.8 6 5"/><circle cx="17" cy="9" r="2.4"/><path d="M16.5 14.2c2.6.3 4.5 1.9 4.5 4.3"/></svg><span id="lbPt"></span></span><span id="pt"></span></div>
  <div class="tile w2" id="tTr"><span class="lab"><svg viewBox="0 0 24 24"><path d="M12 21s-8-5-8-11a4.5 4.5 0 0 1 8-3 4.5 4.5 0 0 1 8 3c0 6-8 11-8 11z"/></svg><span id="lbTr"></span></span><span id="tc"></span></div>
 </div>
 <div id="note"></div>
</div></div>
<script>
(function(){
 function g(id){return document.getElementById(id);}
 function esc(s){return String(s==null?'':s).replace(/[<>&]/g,function(x){return{'<':'&lt;','>':'&gt;','&':'&amp;'}[x];});}
 function has(v){return v!=null&&String(v).trim()!=='';}
 function url(v){v=String(v||'').trim();if(!v)return '';return /^https?:\/\//i.test(v)?v:'https://files.catbox.moe/'+v;}
 var raw=(g('raw').value||'').replace(/<\/?ZZZ_STATUS>/gi,'').trim();
 var D={};try{if(raw&&raw.charAt(0)==='{')D=JSON.parse(raw);}catch(e){}
 var th=(D.ui_lang==='th');function L(en,t){return th?t:en;}
 g('sub').textContent='// '+L('HDD LINK','ลิงก์ HDD');
 g('lbTime').textContent=L('Time','เวลา');g('lbDen').textContent=L('Dennies','เดนนี');
 g('lbLoc').textContent=L('Location','สถานที่');g('lbCm').textContent=L('Commission','ภารกิจ');
 g('lbPt').textContent=L('Agents','เอเจนต์');g('lbTr').textContent=L('Trust','ความไว้ใจ');
 g('dateL').textContent=has(D.date)?D.date:'';
 g('locTop').textContent=L('ERIDU // NEW ERIDU','เอริดู // นิวเอริดู');
 // time phases
 var PH=[['morning','MORN','เช้า','<circle cx="12" cy="13" r="4"/><path d="M12 3v3M4 13H2M22 13h-2M5.6 6.6 7 8M18.4 6.6 17 8M4 19h16"/>'],
         ['noon','NOON','เที่ยง','<circle cx="12" cy="12" r="4.5"/><path d="M12 2v3M12 19v3M2 12h3M19 12h3M4.9 4.9 7 7M19.1 4.9 17 7M4.9 19.1 7 17M19.1 19.1 17 17"/>'],
         ['afternoon','AFTN','บ่าย','<circle cx="13" cy="11" r="4.5"/><path d="M13 2v2.5M21 11h-2.5M18.7 5.3l-1.8 1.8M3 17h18M6 21h12"/>'],
         ['evening','EVE','เย็น','<path d="M3 15h18M6 19h12"/><circle cx="12" cy="11" r="4" /><path d="M2 11h3M19 11h3"/>'],
         ['midnight','MID','เที่ยงคืน','<path d="M20 13.5A8 8 0 1 1 10.5 4 6.5 6.5 0 0 0 20 13.5z"/><path d="M17 4l.6 1.6L19 6l-1.4.6L17 8l-.5-1.4L15 6l1.5-.4z"/>']];
 var pv=String(D.phase||'').toLowerCase();if(pv==='night')pv='midnight';if(pv==='morn')pv='morning';
 var pi=0;for(var i=0;i<PH.length;i++)if(PH[i][0]===pv)pi=i;
 var seg='';for(var i=0;i<PH.length;i++)seg+='<i'+(i===pi?' class="on"':'')+'>'+(th?PH[i][2]:PH[i][1])+'</i>';
 g('ph').innerHTML=seg;g('ph').style.display='flex';
 var full={morning:['Morning','ยามเช้า'],noon:['Noon','เที่ยงวัน'],afternoon:['Afternoon','ยามบ่าย'],evening:['Evening','ยามเย็น'],midnight:['Midnight','เที่ยงคืน']};
 g('phN').textContent=th?full[PH[pi][0]][1]:full[PH[pi][0]][0];
 g('phIc').innerHTML=PH[pi][3];g('phIc').setAttribute('stroke','#d3fd51');
 // dennies
 if(D.dennies!=null&&String(D.dennies).trim()!==''){var dv=D.dennies;if(typeof dv==='number')dv=dv.toString().replace(/\B(?=(\d{3})+(?!\d))/g,',');g('dn').textContent=dv;}
 else g('tDen').classList.add('hide');
 // location
 if(has(D.location))g('loc').textContent=D.location;else g('tLoc').classList.add('hide');
 // commission
 var cm=D.commission||{};
 if(has(cm.title)){
  g('cmT').textContent=cm.title;
  var pr=String(cm.progress||'').trim();g('cmP').textContent=pr;
  var mm=pr.match(/^(\d+)\s*\/\s*(\d+)$/);
  if(mm){g('cmB').firstChild.style.width=Math.max(0,Math.min(100,mm[1]/mm[2]*100))+'%';}
  else g('cmB').classList.add('hide');
 }else g('tCm').classList.add('hide');
 // party
 var P=Array.isArray(D.party)?D.party:[];
 if(P.length){var h='';
  for(var i=0;i<P.length;i++){var a=P[i]||{};var hx=String(a.hex||'#d3fd51');
   var av=has(a.avatar)?'<img src="'+esc(url(a.avatar))+'" alt="" onerror="this.outerHTML=\'<span class=ini>'+esc(String(a.name||'?').charAt(0).toUpperCase())+'</span>\'">':'<span class="ini">'+esc(String(a.name||'?').charAt(0).toUpperCase())+'</span>';
   h+='<span class="ag"><span class="av" style="--hx:'+esc(hx)+'">'+av+'</span><b>'+esc(a.name)+'</b></span>';}
  g('pt').innerHTML=h;g('pt').style.display='flex';
 }else g('tPt').classList.add('hide');
 // trust
 var T=Array.isArray(D.trust)?D.trust:[];
 if(T.length){var h2='';
  for(var i=0;i<T.length;i++){var t=T[i]||{};var d=parseFloat(t.delta)||0;
   h2+='<span class="tch '+(d<0?'dn':'up')+'">'+(d<0?'▼':'▲')+' '+esc(t.name)+' '+(d>0?'+':'')+d+'</span>';}
  g('tc').innerHTML=h2;g('tc').style.display='flex';
 }else g('tTr').classList.add('hide');
 // note
 if(has(D.note))g('note').textContent=D.note;else g('note').classList.add('hide');
})();
</script>
</body></html>
