<!DOCTYPE html><html><head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/>
<link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@500;600;700;800&family=Noto+Serif+JP:wght@500;700;900&family=Noto+Serif+Thai:wght@500;700&family=M+PLUS+1:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{background:transparent;font-family:'Shippori Mincho','Noto Serif JP','Noto Serif Thai',serif}
.sc{--acc:#e23636;--abg:rgba(226,54,54,.08);--abd:rgba(226,54,54,.3);width:100%;max-width:420px;margin:8px auto;position:relative}
.rl{height:16px;background:linear-gradient(180deg,#4a3424,#7a5838 28%,#a07850 50%,#7a5838 72%,#4a3424);border-radius:8px;box-shadow:0 3px 9px rgba(0,0,0,.55),inset 0 1px 0 rgba(255,220,180,.25);position:relative;z-index:3}
.rl::before,.rl::after{content:'';position:absolute;top:50%;transform:translateY(-50%);width:8px;height:22px;background:radial-gradient(ellipse at center,#5a4030,#2e2014);border-radius:3px;box-shadow:0 2px 5px rgba(0,0,0,.6)}
.rl::before{left:-4px}.rl::after{right:-4px}
.pp{background:linear-gradient(180deg,#e6d2b4,#f2e6d0 3%,#f5ecd8 50%,#f0e2cb 97%,#dcc8aa);margin:0 6px;box-shadow:inset 4px 0 12px rgba(90,60,30,.10),inset -4px 0 12px rgba(90,60,30,.10),0 4px 18px rgba(0,0,0,.5);position:relative;overflow:hidden}
.wm{position:absolute;inset:0;pointer-events:none;overflow:hidden;z-index:0}
.wm span{position:absolute;font-family:'Noto Serif JP',serif;font-weight:900;color:#8b5a2b;opacity:.04;line-height:1}
.inn{position:relative;z-index:1;padding:12px 12px 8px}
.hdr{display:flex;align-items:center;gap:10px;padding-bottom:10px;border-bottom:2px solid #c4a882;margin-bottom:2px}
.hdr .av{width:44px;height:44px;flex-shrink:0;border-radius:50%;border:2px solid var(--acc);display:flex;align-items:center;justify-content:center;background:radial-gradient(circle,#f5ecd8,#e6d2b4);box-shadow:0 0 0 3px var(--abg)}
.hdr .av span{font-family:'Noto Serif JP',serif;font-size:20px;font-weight:900;color:var(--acc)}
.hdr .info{flex:1;min-width:0}
.hdr .nm{font-size:15px;font-weight:800;color:#5a3818;letter-spacing:1px;line-height:1.2;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.hdr .sub{font-family:'M PLUS 1',sans-serif;font-size:8.5px;color:#a8865c;letter-spacing:.5px;margin-top:2px}
.hdr .sub .dot{display:inline-block;width:7px;height:7px;border-radius:50%;background:var(--acc);vertical-align:middle;margin-right:3px;box-shadow:0 0 5px var(--abd)}
.hdr .money{text-align:right;flex-shrink:0}
.hdr .money .amt{font-family:'M PLUS 1',sans-serif;font-size:14px;font-weight:700;color:#5a3818;letter-spacing:.5px}
.hdr .money .cur{font-family:'M PLUS 1',sans-serif;font-size:7px;letter-spacing:1px;color:#a8865c;text-transform:uppercase}
.sec{border-top:1px solid rgba(196,168,130,.6)}
.sec:first-child{border-top:none}
.sec-h{display:flex;align-items:center;gap:8px;padding:10px 4px;cursor:pointer;user-select:none;-webkit-user-select:none}
.sec-h:active{opacity:.7}
.sec-h .sk{width:22px;height:22px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-family:'Noto Serif JP',serif;font-size:13px;font-weight:900;color:#f5ecd8;background:linear-gradient(135deg,#8b4513,#6a3410);border-radius:4px;box-shadow:0 1px 3px rgba(0,0,0,.3)}
.sec-h .st{flex:1;font-family:'M PLUS 1',sans-serif;font-size:10px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:#5a3818}
.sec-h .badge{font-family:'M PLUS 1',sans-serif;font-size:8px;font-weight:700;letter-spacing:.5px;color:var(--acc);border:1px solid var(--abd);border-radius:8px;padding:2px 7px;background:var(--abg)}
.sec-h .arr{font-family:'M PLUS 1',sans-serif;font-size:11px;color:#b89464;transition:transform .2s;flex-shrink:0}
.sec.open .sec-h .arr{transform:rotate(90deg)}
.sec-b{display:none;padding:0 4px 12px}
.sec.open .sec-b{display:block}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:6px}
.kv{margin-bottom:6px}
.kl{font-family:'M PLUS 1',sans-serif;font-size:7.5px;letter-spacing:1px;text-transform:uppercase;color:#9a7848;margin-bottom:2px}
.vl{font-size:11.5px;color:#3a2a1a;line-height:1.4}
.card{background:rgba(255,251,242,.45);border:1px solid #cbb088;border-radius:6px;padding:8px 10px;margin-bottom:6px}
.card .cn{font-size:11.5px;font-weight:700;color:#5a3818}
.card .cd{font-size:10px;color:#6a4a28;line-height:1.45;margin-top:3px}
.card .cm{font-family:'M PLUS 1',sans-serif;font-size:8px;color:#9a7848;margin-top:3px;display:flex;gap:8px;flex-wrap:wrap}
.tag{display:inline-block;font-family:'M PLUS 1',sans-serif;font-size:8.5px;border-radius:10px;padding:3px 8px;border:1px solid #cbb088;color:#6a4a28;background:rgba(255,251,242,.5)}
.tag.r{color:#cc3333;border-color:rgba(204,51,51,.3);background:rgba(204,51,51,.06)}
.tag.g{color:#3d6a28;border-color:rgba(90,138,58,.3);background:rgba(90,138,58,.06)}
.tag.b{color:#2a5a8b;border-color:rgba(42,90,139,.3);background:rgba(42,90,139,.06)}
.tag.a{color:var(--acc);border-color:var(--abd);background:var(--abg)}
.sep{border:none;border-top:1px dashed #cdb491;margin:8px 0}
.bar-wrap{margin-bottom:8px}
.bar-head{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:3px}
.bar-lbl{font-family:'M PLUS 1',sans-serif;font-size:8px;letter-spacing:1px;text-transform:uppercase;color:#9a7848}
.bar-val{font-family:'M PLUS 1',sans-serif;font-size:9px;font-weight:700;color:#5a3818}
.bar{height:6px;background:rgba(180,140,90,.18);border-radius:6px;overflow:hidden}
.bar i{display:block;height:100%;border-radius:6px;transition:width .4s}
.bar-hp i{background:linear-gradient(90deg,#5a8a3a,#7ab84a)}
.bar-hp.low i{background:linear-gradient(90deg,#cc3333,#e65555)}
.bar-ck i{background:linear-gradient(90deg,#2a6aaa,#4a9ead)}
.bar-ne i{background:linear-gradient(90deg,#d98a2b,#e6b341)}
.bar-rep i{background:linear-gradient(90deg,var(--acc),#d9a654)}
.eye-row{display:flex;gap:8px;margin-bottom:6px}
.eye-slot{flex:1;background:rgba(255,251,242,.45);border:1px solid #cbb088;border-radius:6px;padding:8px;text-align:center;position:relative}
.eye-slot.blind{opacity:.45;border-style:dashed}
.eye-slot .el{font-family:'M PLUS 1',sans-serif;font-size:7px;letter-spacing:1px;text-transform:uppercase;color:#9a7848;margin-bottom:4px}
.eye-slot .ek{font-family:'Noto Serif JP',serif;font-size:26px;font-weight:900;color:#8b4513;line-height:1}
.eye-slot .en{font-size:10px;color:#5a3818;font-weight:700;margin-top:4px}
.eye-slot .es{font-family:'M PLUS 1',sans-serif;font-size:8px;margin-top:2px}
.eye-slot .es.active{color:#3d6a28}
.eye-slot .es.sealed{color:#cc3333}
.eye-slot .es.blind-t{color:#999}
.eye-slot .blind-x{font-family:'M PLUS 1',sans-serif;font-size:22px;color:#cc3333;line-height:1;margin:4px 0}
.beast-header{display:flex;align-items:center;gap:10px;margin-bottom:8px}
.beast-icon{width:38px;height:38px;flex-shrink:0;border-radius:50%;background:linear-gradient(135deg,var(--acc),#d97a2b);display:flex;align-items:center;justify-content:center;box-shadow:0 2px 8px rgba(0,0,0,.3)}
.beast-icon span{font-family:'Noto Serif JP',serif;font-size:18px;font-weight:900;color:#f5ecd8}
.beast-info .bn{font-size:13px;font-weight:800;color:#5a3818}
.beast-info .bt{font-family:'M PLUS 1',sans-serif;font-size:8.5px;color:#a8865c;letter-spacing:.5px}
.prog-stages{display:flex;gap:3px;margin:8px 0}
.prog-stage{flex:1;height:6px;border-radius:3px;background:rgba(180,140,90,.18);position:relative;overflow:hidden}
.prog-stage.done{background:var(--acc);box-shadow:0 0 4px var(--abd)}
.prog-stage.current{background:rgba(180,140,90,.18)}
.prog-stage.current::after{content:'';position:absolute;left:0;top:0;height:100%;width:60%;border-radius:3px;background:var(--acc);animation:pulse 1.5s infinite alternate}
@keyframes pulse{from{opacity:.6}to{opacity:1}}
.seal-box{background:rgba(204,51,51,.06);border:1px solid rgba(204,51,51,.25);border-radius:6px;padding:8px 10px;margin-bottom:6px}
.seal-box .sl{font-family:'M PLUS 1',sans-serif;font-size:8px;letter-spacing:1px;text-transform:uppercase;color:#cc3333;margin-bottom:3px}
.seal-box .sd{font-size:10.5px;color:#6a4a28;line-height:1.45}
.mission-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
.mission-name{font-size:13px;font-weight:800;color:#5a3818}
.mission-rank{font-family:'M PLUS 1',sans-serif;font-size:10px;font-weight:700;letter-spacing:1px;color:#f5ecd8;background:linear-gradient(135deg,#cc3333,#a32828);border-radius:4px;padding:2px 8px}
.obj{display:flex;align-items:flex-start;gap:6px;margin-bottom:5px}
.obj .oc{width:14px;height:14px;flex-shrink:0;border:1.5px solid #cbb088;border-radius:3px;margin-top:1px;display:flex;align-items:center;justify-content:center}
.obj.done .oc{border-color:#5a8a3a;background:rgba(90,138,58,.15)}
.obj.done .oc::after{content:'✓';font-size:9px;color:#5a8a3a;font-weight:700}
.obj .ot{font-size:10.5px;color:#5a3818;line-height:1.4}
.obj.opt .ot{color:#9a7848;font-style:italic}
.abi{display:flex;align-items:flex-start;gap:8px;margin-bottom:8px}
.abi .ai{width:28px;height:28px;flex-shrink:0;border-radius:5px;display:flex;align-items:center;justify-content:center;font-family:'Noto Serif JP',serif;font-size:14px;font-weight:900;color:#f5ecd8;background:linear-gradient(135deg,#8b4513,#6a3410);box-shadow:0 1px 3px rgba(0,0,0,.3)}
.abi .abi-info{flex:1}
.abi .an{font-size:11.5px;font-weight:700;color:#5a3818}
.abi .ad{font-size:10px;color:#6a4a28;line-height:1.4;margin-top:2px}
.abi .at{display:flex;gap:6px;flex-wrap:wrap;margin-top:3px}
.cd-pill{font-family:'M PLUS 1',sans-serif;font-size:7.5px;font-weight:600;letter-spacing:.5px;padding:2px 6px;border-radius:8px}
.cd-ready{color:#3d6a28;background:rgba(90,138,58,.12);border:1px solid rgba(90,138,58,.3)}
.cd-cool{color:#cc3333;background:rgba(204,51,51,.08);border:1px solid rgba(204,51,51,.25)}
.cd-info{color:#2a5a8b;background:rgba(42,90,139,.08);border:1px solid rgba(42,90,139,.25)}
.cd-ring{width:18px;height:18px;flex-shrink:0;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:'M PLUS 1',sans-serif;font-size:7px;font-weight:700}
.cd-ring.ready{color:#3d6a28;border:2px solid #5a8a3a;background:rgba(90,138,58,.08)}
.cd-ring.wait{color:#cc3333;border:2px solid #cc3333;background:rgba(204,51,51,.06)}
@media(max-width:360px){.inn{padding:10px 8px 6px}.hdr .nm{font-size:13px}.eye-slot .ek{font-size:22px}}
@media(min-width:500px){.sc{max-width:480px}.inn{padding:14px 16px 10px}}
@media(min-width:700px){.sc{max-width:600px}.inn{padding:18px 22px 12px}}
</style></head><body>
<textarea id="sraw" style="display:none;position:absolute;left:-9999px">$1</textarea>
<div class="sc" id="sapp">
<div class="rl"></div>
<div class="pp"><div class="wm"><span style="top:3%;left:-2%;font-size:100px;transform:rotate(-8deg)">忍</span><span style="top:25%;right:-3%;font-size:110px;transform:rotate(6deg)">術</span><span style="top:50%;left:-2%;font-size:100px">火</span><span style="top:75%;right:-3%;font-size:90px;transform:rotate(-5deg)">風</span></div>
<div class="inn" id="sbody"></div></div>
<div class="rl"></div>
</div>
<script>
(function(){
var raw=(document.getElementById('sraw').value||'').trim();
var d={};try{d=JSON.parse(raw);}catch(e){return;}
var E=function(s){return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');};
var acc=d.theme||'#4a9ead';
var sc=document.getElementById('sapp');
function hr(hex,a){hex=String(hex||'#4a9ead').replace('#','');if(hex.length===3)hex=hex[0]+hex[0]+hex[1]+hex[1]+hex[2]+hex[2];var n=parseInt(hex,16);if(isNaN(n))n=0x4a9ead;return 'rgba('+((n>>16)&255)+','+((n>>8)&255)+','+(n&255)+','+a+')';}
sc.style.setProperty('--acc',acc);sc.style.setProperty('--abg',hr(acc,.08));sc.style.setProperty('--abd',hr(acc,.3));
var p=d.profile||{};var af=d.affiliation||{};var en=d.energy||{};
var body=document.getElementById('sbody');var h='';
var money=p.money!=null?Number(p.money).toLocaleString():'0';
var meta=[];if(af.rank)meta.push(E(af.rank));if(af.village)meta.push(E(af.village));if(p.age)meta.push(E(p.age));
h+='<div class="hdr"><div class="av"><span>忍</span></div><div class="info"><div class="nm">'+E(p.name||'—')+'</div><div class="sub"><span class="dot"></span>'+meta.join(' · ')+'</div></div><div class="money"><div class="amt">'+money+'</div><div class="cur">Ryō 両</div></div></div>';
h+='<div id="secs">';
function secH(k,t,bg,badge){return '<div class="sec'+(k==='profile'?' open':'')+'" data-sec="'+k+'"><div class="sec-h"><span class="sk"'+(bg?' style="background:'+bg+'"':'')+'>'+(k==='profile'?'己':k==='jutsu'?'術':k==='affil'?'里':k==='jinchuriki'?'獣':k==='mission'?'任':k==='energy'?'命':k==='dojutsu'?'瞳':'?')+'</span><span class="st">'+E(t)+'</span>'+(badge?'<span class="badge"'+(badge.s?' style="'+badge.s+'"':'')+'>'+E(badge.t)+'</span>':'')+'<span class="arr">▸</span></div><div class="sec-b">';}
function secF(){return '</div></div>';}
function kv(l,v){return '<div class="kv"><div class="kl">'+E(l)+'</div><div class="vl">'+E(v||'—')+'</div></div>';}
function kvIf(l,v){return(v&&String(v).trim())?kv(l,v):'';}
function bar(cls,lbl,val,mx){var pct=mx>0?Math.round(val/mx*100):0;return '<div class="bar-wrap"><div class="bar-head"><span class="bar-lbl">'+E(lbl)+'</span><span class="bar-val">'+val+' / '+mx+'</span></div><div class="bar '+cls+(cls==='bar-hp'&&pct<30?' low':'')+'"><i style="width:'+pct+'%"></i></div></div>';}
h+=secH('profile','Profile','',null);
h+='<div class="grid2">'+kv('Name',p.name)+kv('Age',p.age)+kv('Sex',p.sex)+kv('Blood Type',p.blood_type)+kv('Clan',p.clan)+kv('Being',p.being)+'</div>';
h+='<hr class="sep"/>';
if(p.nindo)h+='<div class="kv"><div class="kl">Nindō</div><div class="vl">「'+E(p.nindo)+'」</div></div>';
h+='<div class="grid2">'+kvIf('Team',p.team)+kvIf('Sensei',p.sensei)+kvIf('Rivals',p.rivals)+'</div>';
if(p.personality)h+=kv('Personality',p.personality);
h+=secF();
var ju=d.jutsu;
if(ju){
h+=secH('jutsu','Jutsu','',ju.known_count?{t:ju.known_count+' known'}:null);
if(ju.signature&&ju.signature.length){h+='<div class="kl" style="margin-bottom:6px">Signature Jutsu</div>';
ju.signature.forEach(function(j){h+='<div class="card"><div style="display:flex;align-items:center;justify-content:space-between"><div class="cn">'+E(j.name)+(j.kanji?' — '+E(j.kanji):'')+'</div><div class="cd-ring ready">✓</div></div><div class="cm">'+(j.rank?'<span class="tag b">'+E(j.rank)+'</span>':'')+(j.element?'<span class="tag">'+E(j.element)+'</span>':'')+'</div>'+(j.description?'<div class="cd" style="font-size:10px;color:#6a4a28;line-height:1.4;margin-top:4px">'+E(j.description)+'</div>':'')+'</div>';});}
if(ju.recent&&ju.recent.length){h+='<hr class="sep"/><div class="kl" style="margin-bottom:6px">Recent Jutsu Used</div>';
ju.recent.forEach(function(j){var rdy=(!j.cooldown||j.cooldown<=0);h+='<div class="card" style="padding:6px 10px"><div style="display:flex;align-items:center;justify-content:space-between"><div class="cn" style="font-size:10.5px">'+E(j.name)+'</div><div class="cd-ring '+(rdy?'ready':'wait')+'">'+(rdy?'✓':j.cooldown)+'</div></div><div class="cm"><span class="cd-pill '+(rdy?'cd-ready':'cd-cool')+'">'+(rdy?'READY':j.cooldown+' TURN'+(j.cooldown>1?'S':'')+' LEFT')+'</span>'+(j.rank?'<span class="tag b" style="font-size:7.5px;padding:2px 6px">'+E(j.rank)+'</span>':'')+'</div></div>';});}
h+=secF();}
if(af.village||af.rank){
h+=secH('affil','Affiliation','',af.rank?{t:af.rank}:null);
h+='<div class="grid2">'+kv('Village',af.village)+kv('Rank',af.rank)+kvIf('Allegiance',af.allegiance)+kvIf('Missions Done',af.missions_done)+'</div>';
if(af.reputation!=null){var rmx=af.reputation_max||100;h+=bar('bar-rep','Village Reputation',af.reputation,rmx);}
if(af.titles&&af.titles.length){h+='<div style="display:flex;gap:4px;flex-wrap:wrap">';af.titles.forEach(function(t){h+='<span class="tag g">'+E(t)+'</span>';});h+='</div>';}
h+=secF();}
var ji=d.jinchuriki;
if(ji){
h+=secH('jinchuriki','Jinchūriki','linear-gradient(135deg,#cc3333,#8b2020)',{t:ji.beast||'?'});
h+='<div class="beast-header"><div class="beast-icon"><span>'+E(ji.kanji||'獣')+'</span></div><div class="beast-info"><div class="bn">'+E(ji.beast)+(ji.title?' — '+E(ji.title):'')+'</div>'+(ji.description?'<div class="bt">'+E(ji.description)+'</div>':'')+'</div></div>';
if(ji.stages&&ji.stages.length){
h+='<div class="kl" style="margin-bottom:4px">Jinchūriki Progression</div>';
var cur=ji.current_stage||0;
h+='<div style="display:flex;justify-content:space-between;margin-bottom:2px">';
ji.stages.forEach(function(s,i){var c=i===cur?'var(--acc);font-weight:700':'#9a7848';h+='<span style="font-family:\'M PLUS 1\',sans-serif;font-size:8px;color:'+c+'">'+E(s)+'</span>';});
h+='</div><div class="prog-stages">';
ji.stages.forEach(function(s,i){h+='<div class="prog-stage'+(i<cur?' done':i===cur?' current':'')+'"></div>';});
h+='</div>';
h+='<div style="font-family:\'M PLUS 1\',sans-serif;font-size:9px;color:var(--acc);font-weight:700;margin:4px 0 8px">Current: '+E(ji.stages[cur]||'—')+'</div>';}
if(ji.seal){h+='<hr class="sep"/><div class="seal-box"><div class="sl">⚠ Seal Active — '+E(ji.seal.name)+'</div><div class="sd">'+E(ji.seal.effect)+'</div></div>';}
if(ji.inherited_jutsu&&ji.inherited_jutsu.length){h+='<hr class="sep"/><div class="kl" style="margin-bottom:6px">Inherited Beast Jutsu</div>';
ji.inherited_jutsu.forEach(function(j){h+='<div class="card"><div class="cn">'+E(j.name)+(j.kanji?' — '+E(j.kanji):'')+'</div><div class="cm">'+(j.rank?'<span class="tag r">'+E(j.rank)+'</span>':'')+(j.requirement?'<span class="cd-pill cd-info">'+E(j.requirement)+'</span>':'')+'</div>'+(j.description?'<div class="cd" style="font-size:10px;color:#6a4a28;line-height:1.4;margin-top:3px">'+E(j.description)+'</div>':'')+'</div>';});}
h+=secF();}
var mi=d.mission;
if(mi){
h+=secH('mission','Active Mission','linear-gradient(135deg,#8b6914,#6a5210)',{t:mi.rank+'-Rank',s:'color:#cc3333;border-color:rgba(204,51,51,.3);background:rgba(204,51,51,.06)'});
h+='<div class="mission-head"><div class="mission-name">'+E(mi.name)+'</div><div class="mission-rank">'+E(mi.rank)+'</div></div>';
if(mi.description)h+=kv('Description',mi.description);
if(mi.objectives&&mi.objectives.length){h+='<hr class="sep"/><div class="kl" style="margin-bottom:6px">Objectives</div>';
mi.objectives.forEach(function(o){h+='<div class="obj'+(o.done?' done':'')+'"><div class="oc"></div><div class="ot">'+E(o.text)+'</div></div>';});}
if(mi.optional&&mi.optional.length){mi.optional.forEach(function(o){h+='<div class="obj opt'+(o.done?' done':'')+'"><div class="oc"></div><div class="ot">Optional: '+E(o.text)+'</div></div>';});}
if(mi.rewards&&mi.rewards.length){h+='<hr class="sep"/><div class="kl" style="margin-bottom:4px">Rewards</div><div style="display:flex;gap:4px;flex-wrap:wrap">';mi.rewards.forEach(function(r){h+='<span class="tag g">'+E(r)+'</span>';});h+='</div>';}
h+=secF();}
if(en){
var sts=en.status||'—';var stcol=sts==='Stable'?'color:#3d6a28;border-color:rgba(90,138,58,.3);background:rgba(90,138,58,.06)':'';
h+=secH('energy','Energy','linear-gradient(135deg,#2a6aaa,#1a4a7a)',{t:sts,s:stcol});
h+=bar('bar-hp','Health',en.hp||0,en.hp_max||100);
h+=bar('bar-ck','Chakra',en.chakra||0,en.chakra_max||100);
h+=bar('bar-ne','Nature Energy',en.nature_energy||0,en.nature_energy_max||100);
var tags='';if(en.wounds)en.wounds.forEach(function(w){tags+='<span class="tag r">'+E(w)+'</span>';});
if(en.healthy)en.healthy.forEach(function(w){tags+='<span class="tag g">'+E(w)+'</span>';});
if(tags)h+='<div style="display:flex;gap:4px;flex-wrap:wrap;margin-bottom:8px">'+tags+'</div>';
if(en.left_eye||en.right_eye){
h+='<hr class="sep"/><div class="kl" style="margin-bottom:6px">Dōjutsu Status</div><div class="eye-row">';
function eyeSlot(label,kanji_label,eye){
if(!eye)return '<div class="eye-slot blind"><div class="el">'+E(label)+'</div><div class="ek" style="color:#cbb088">—</div><div class="en" style="color:#999">None</div></div>';
var bl=eye.state==='blind'||eye.state==='stolen';
h+='<div class="eye-slot'+(bl?' blind':'')+'"><div class="el">'+E(label)+' '+E(kanji_label)+'</div>';
if(bl){h+='<div class="blind-x">✕</div><div class="en" style="color:#999">'+E(eye.state==='stolen'?'Stolen':'Blind')+'</div><div class="es blind-t">● '+E(eye.state==='stolen'?'Stolen':'Blind')+'</div>';}
else{h+='<div class="ek">'+E(eye.kanji||'◉')+'</div><div class="en">'+E(eye.name||'—')+'</div><div class="es '+(eye.state==='sealed'?'sealed':'active')+'">● '+E(eye.state==='sealed'?'Sealed':'Active')+'</div>';}
h+='</div>';}
eyeSlot('Left Eye','左眼',en.left_eye);eyeSlot('Right Eye','右眼',en.right_eye);
h+='</div>';}
if(en.eye_warning){h+='<div class="card" style="border-color:rgba(204,51,51,.25);background:rgba(204,51,51,.04)"><div class="cn" style="font-size:10px;color:#cc3333">⚠ Eye Strain Warning</div><div class="cd" style="font-size:9.5px;color:#6a4a28;line-height:1.4;margin-top:2px">'+E(en.eye_warning)+'</div></div>';}
h+=secF();}
var dj=d.dojutsu;
if(dj){
h+=secH('dojutsu','Dōjutsu','linear-gradient(135deg,#6a2080,#4a1060)',{t:dj.stage||'?',s:'color:#6a2080;border-color:rgba(106,32,128,.3);background:rgba(106,32,128,.06)'});
h+=kv('Current Stage',E(dj.stage)+(dj.stage_kanji?' — '+E(dj.stage_kanji):''));
if(dj.abilities&&dj.abilities.length){h+='<hr class="sep"/><div class="kl" style="margin-bottom:8px">Unlocked Abilities</div>';
dj.abilities.forEach(function(a){h+='<div class="abi"><div class="ai">'+E(a.kanji?a.kanji.charAt(0):'?')+'</div><div class="abi-info"><div class="an">'+E(a.name)+(a.kanji?' — '+E(a.kanji):'')+'</div>'+(a.description?'<div class="ad">'+E(a.description)+'</div>':'')+'<div class="at">';
if(a.eye)h+='<span class="cd-pill cd-info">'+E(a.eye)+'</span>';
if(a.tags)a.tags.forEach(function(t){var cls=t.indexOf('READY')>=0||t.indexOf('STAGE')>=0?'cd-ready':'cd-cool';h+='<span class="cd-pill '+cls+'">'+E(t)+'</span>';});
h+='</div></div></div>';});}
if(dj.locked&&dj.locked.length){h+='<hr class="sep"/><div class="kl" style="margin-bottom:4px">Locked — Requires Higher Stage</div><div style="display:flex;gap:4px;flex-wrap:wrap;opacity:.5">';dj.locked.forEach(function(l){h+='<span class="tag">'+E(l)+'</span>';});h+='</div>';}
h+=secF();}
h+='</div>';
body.innerHTML=h;
document.querySelectorAll('.sec').forEach(function(s){s.querySelector('.sec-h').addEventListener('click',function(){s.classList.toggle('open');});});
})();
</script>
</body></html>
